name: Sign & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sync manifest version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "Set manifest version to $VERSION"

      - name: Sign extension
        run: |
          web-ext sign \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=unlisted \
            --approval-timeout=1800000 \
            --ignore-files=".github/**" ".gitignore" ".git/**"

      # AMO names the signed file after the add-on's internal id (e.g.
      # 4f3e…-1.31.xpi). Rename it to something recognizable on the release page.
      - name: Rename signed XPI
        id: xpi
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          SRC=$(ls web-ext-artifacts/*.xpi | head -n1)
          DEST="web-ext-artifacts/seo-inspector-v${VERSION}.xpi"
          mv "$SRC" "$DEST"
          echo "name=seo-inspector-v${VERSION}.xpi" >> "$GITHUB_OUTPUT"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "Renamed $(basename "$SRC") -> $(basename "$DEST")"

      - name: Upload XPI as artifact
        uses: actions/upload-artifact@v7
        with:
          name: seo-inspector-signed
          path: ${{ steps.xpi.outputs.path }}
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.xpi.outputs.path }}
          generate_release_notes: true
