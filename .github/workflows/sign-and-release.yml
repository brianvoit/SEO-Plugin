name: Sign & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sync manifest version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "Set manifest version to $VERSION"

      - name: Sign extension
        run: |
          web-ext sign \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=unlisted \
            --ignore-files=".github/**" ".gitignore" ".git/**"

      - name: Upload XPI as artifact
        uses: actions/upload-artifact@v4
        with:
          name: seo-inspector-signed
          path: web-ext-artifacts/*.xpi
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: web-ext-artifacts/*.xpi
          generate_release_notes: true
